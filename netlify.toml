[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/guest"
  to = "/.netlify/functions/guest-lookup"
  status = 200

[[redirects]]
  from = "/api/guest/rsvp"
  to = "/.netlify/functions/guest-rsvp"
  status = 200

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/session"
  to = "/.netlify/functions/admin-session"
  status = 200

[[redirects]]
  from = "/api/admin/guests"
  to = "/.netlify/functions/admin-guests"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
